easier_axolotl_breeding.name=Easier Axolotl Breeding
easier_axolotl_breeding.description=Breed axolotls using Tropical Fish instead of Buckets of Tropical Fish.
easier_nametags.name=Easier Name Tags
easier_nametags.description=Shift-right-click a Name Tag to open a UI to rename the name tag without an anvil.
